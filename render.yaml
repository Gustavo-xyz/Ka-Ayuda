services:
  - type: web
    name: ka-ayuda-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn "backend.server.app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ka-ayuda-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: ka-ayuda-db
    databaseName: ayuda
    user: ayuda_user
    plan: free
